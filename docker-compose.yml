services:
  postgres:
    image: postgres:18
    container_name: spring-ai
    environment:
      POSTGRES_DB: spring_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql   # PG18+ stores data in a versioned subdir; mount the parent, not /data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d spring_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
